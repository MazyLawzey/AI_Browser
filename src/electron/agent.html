<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent — Moodle</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      background: #f5f5f5;
    }

    webview {
      width: 100%;
      height: 100%;
      border: none;
      flex: 1;
      min-width: 0;
      min-height: 0;
    }

    #toolbar {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 280px;
      background: rgba(30, 30, 30, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      color: #eee;
      z-index: 9999;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      user-select: none;
    }

    .title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: grab;
      user-select: none;
    }

    .status {
      margin: 12px 0 8px 0;
      padding: 0;
      line-height: 1.5;
    }

    .status-label {
      font-weight: 500;
      color: #aaa;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-text {
      color: #cdd6f4;
      margin-top: 4px;
      word-break: break-word;
    }

    .status.running .status-text {
      color: #89b4fa;
    }

    .status.error .status-text {
      color: #f38ba8;
    }

    .status.stopped .status-text {
      color: #f5e0dc;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button:hover {
      background: #6d28d9;
    }

    button:disabled {
      background: #4a4a6a;
      cursor: default;
      opacity: 0.6;
    }

    button.stop-btn {
      background: #f38ba8;
    }

    button.stop-btn:hover {
      background: #f35c7a;
    }
  </style>
</head>
<body>
  <webview id="moodleWebview" src="https://moodle.example.com"></webview>

  <div id="toolbar">
    <div class="title">
      <span>🤖 Agent Control</span>
    </div>
    <div class="status" id="status">
      <div class="status-label">Status</div>
      <div class="status-text">Ready</div>
    </div>
    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="stopBtn" class="stop-btn" disabled>Stop</button>
    </div>
  </div>

  <script src="./agent.js"></script>
</body>
</html>
