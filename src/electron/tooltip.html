<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tooltip</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #313244;
      user-select: none;
      overflow: hidden;
      -webkit-app-region: drag;
      font-size: 13px;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    #preview {
      font-size: 12px;
      color: #6c7086;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: background 0.2s;
      font-weight: 500;
    }

    button:hover {
      background: #6d28d9;
    }

    button:disabled {
      background: #4a4a6a;
      cursor: default;
      opacity: 0.6;
    }

    #result {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
      max-height: 220px;
      overflow-y: auto;
      color: #cdd6f4;
      border-top: 1px solid #313244;
      padding-top: 8px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 13px;
      background: #7c3aed;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="top-row">
    <span id="preview"></span>
    <button id="askBtn">✨ ask AI</button>
  </div>
  <div id="result"></div>

  <script src="./tooltip.js"></script>
</body>
</html>
